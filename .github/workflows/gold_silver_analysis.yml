name: Gold Silver Platinum Analysis

on:
  schedule:
    # 4× daily — 9 AM, 12 PM, 3 PM, 6 PM IST  (IST = UTC + 5:30)
    - cron: '30 3 * * *'    # 9:00 AM IST
    - cron: '30 6 * * *'    # 12:00 PM IST
    - cron: '30 9 * * *'    # 3:00 PM IST
    - cron: '30 12 * * *'   # 6:00 PM IST

  workflow_dispatch:         # manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: python src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Copy data to reports
        run: |
          mkdir -p reports/data
          cp -f data/*.json reports/data/ 2>/dev/null || true

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          git diff --staged --quiet || git commit -m "📊 Update dashboard — $(TZ='Asia/Kolkata' date '+%d %b %Y %I:%M %p IST')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          force_orphan: true
