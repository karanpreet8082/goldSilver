<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Silver Platinum — Bullion Dashboard</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --gold:#FFD700;--silver:#C0C0C0;--platinum:#E5E4E2;
  --green:#2ea043;--red:#da3633;--yellow:#d29922;
  --blue:#58a6ff;--accent:#1f6feb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.4rem;font-weight:700}.header .subtitle{color:var(--text2);font-weight:400;font-size:1rem}
.header-meta{display:flex;gap:12px;align-items:center;font-size:.85rem;color:var(--text2)}
.last-updated{opacity:.8}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:60px;z-index:99}
.tab{background:none;border:none;color:var(--text2);padding:12px 20px;cursor:pointer;font-size:.95rem;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}

/* Content */
.content{max-width:1200px;margin:0 auto;padding:24px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card-title{font-size:1.1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(350px,1fr))}

/* Price cards */
.price-card{position:relative;overflow:hidden}
.price-card .metal-icon{font-size:2rem;position:absolute;top:12px;right:16px;opacity:.3}
.price-main{font-size:1.8rem;font-weight:700;margin:8px 0 4px}
.price-sub{color:var(--text2);font-size:.9rem;margin-bottom:4px}
.price-change{font-size:.95rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px}
.price-change.up{color:var(--green);background:rgba(46,160,67,.1)}
.price-change.down{color:var(--red);background:rgba(218,54,51,.1)}
.price-change.flat{color:var(--text2)}

/* Badge */
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.8rem;font-weight:600;text-transform:uppercase}
.badge-buy{background:rgba(46,160,67,.15);color:var(--green)}
.badge-sell{background:rgba(218,54,51,.15);color:var(--red)}
.badge-hold{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-info{background:rgba(88,166,255,.12);color:var(--blue)}
.badge-cat{padding:2px 8px;font-size:.75rem;border-radius:8px}

/* Recommendation */
.rec-card{border-left:4px solid var(--border)}
.rec-card.buy{border-left-color:var(--green)}.rec-card.sell{border-left-color:var(--red)}.rec-card.hold{border-left-color:var(--yellow)}
.rec-badge{font-size:1.6rem;font-weight:800;margin:8px 0}
.conf-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;margin:8px 0}
.conf-bar .seg{display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff;min-width:30px}
.conf-bar .seg-buy{background:var(--green)}.conf-bar .seg-sell{background:var(--red)}.conf-bar .seg-hold{background:var(--yellow);color:#000}
.rec-summary{color:var(--text2);margin:12px 0;line-height:1.6}
.signals-list{list-style:none;padding:0}.signals-list li{padding:4px 0;color:var(--text2);font-size:.9rem}
.signals-list li::before{content:'• ';color:var(--gold)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,.02)}

/* Currency table */
.cur-table td:first-child{font-weight:600}

/* Forms */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:4px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;
  color:var(--text);font-size:.9rem;width:100%}
input:focus,select:focus{outline:none;border-color:var(--blue)}
select{cursor:pointer}
button.btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
button.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warning{background:var(--yellow);color:#000}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}

/* Portfolio summary */
.port-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.port-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.port-stat .label{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.port-stat .value{font-size:1.2rem;font-weight:700}
.pnl-pos{color:var(--green)}.pnl-neg{color:var(--red)}

/* News */
.news-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.news-filters button{background:var(--surface);border:1px solid var(--border);color:var(--text2);
  padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:all .15s}
.news-filters button:hover,.news-filters button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.news-card{display:flex;flex-direction:column;gap:8px}
.news-card h3{font-size:1rem;line-height:1.4}
.news-card .meta{font-size:.8rem;color:var(--text2);display:flex;gap:12px;align-items:center;flex-wrap:wrap}

/* Sell modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:420px;width:90%}
.modal h2{margin-bottom:16px;font-size:1.2rem}

/* Ratio card */
.ratio-card{text-align:center;padding:24px}
.ratio-value{font-size:2.4rem;font-weight:800;color:var(--gold)}

/* Footer */
.footer{text-align:center;padding:24px;color:var(--text3);font-size:.8rem;border-top:1px solid var(--border);margin-top:40px}
.footer p{margin:4px 0}

/* Mobile */
@media(max-width:640px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .tabs{padding:0 8px}
  .tab{padding:10px 14px;font-size:.85rem}
  .content{padding:16px}
  .grid-3,.grid-2{grid-template-columns:1fr}
  .price-main{font-size:1.4rem}
  .form-row{flex-direction:column}
  .port-summary{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// ── Tab navigation ──────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

// ── Dashboard ───────────────────────────────────────────────
(function renderDashboard(){
  const p=document.getElementById('panel-dashboard');
  const metals=[
    {key:'gold',  icon:'🥇',label:'Gold',    unit:'₹ / 10g',   priceKey:'price_per_10g_inr',color:'var(--gold)'},
    {key:'silver',icon:'🥈',label:'Silver',  unit:'₹ / kg',    priceKey:'price_per_kg_inr', color:'var(--silver)'},
    {key:'platinum',icon:'⚪',label:'Platinum',unit:'₹ / gram', priceKey:'price_per_gram_inr',color:'var(--platinum)'}
  ];

  // Price cards
  let cards='<div class="grid grid-3">';
  metals.forEach(m=>{
    const d=PRICES[m.key]||{};
    const price=d[m.priceKey]||d.price_per_gram_inr||0;
    const usd=d.price_usd_oz||0;
    const chg=d.change_percent||0;
    const chgClass=chg>0?'up':chg<0?'down':'flat';
    const arrow=chg>0?'▲':chg<0?'▼':'—';
    const rec=(ANALYSIS[m.key]||{}).recommendation||'—';
    const recClass=rec==='BUY'?'badge-buy':rec==='SELL'?'badge-sell':'badge-hold';

    cards+=`<div class="card price-card">
      <div class="metal-icon" style="color:${m.color}">${m.icon}</div>
      <div class="card-title" style="color:${m.color}">${m.label}</div>
      <div class="price-main" style="color:${m.color}">${fmtC(price)}</div>
      <div class="price-sub">${m.unit}</div>
      <div class="price-sub">${fmtUSD(usd)} / troy oz</div>
      <div class="price-sub">₹${fmt(d.price_per_gram_inr||0,2)} / gram</div>
      <span class="price-change ${chgClass}">${arrow} ${Math.abs(chg).toFixed(2)}%</span>
      <span class="badge ${recClass}" style="margin-left:8px">${rec}</span>
    </div>`;
  });
  cards+='</div>';

  // Gold/Silver ratio + currencies
  let extra='<div class="grid grid-2">';
  extra+=`<div class="card ratio-card">
    <div class="card-title">Gold / Silver Ratio</div>
    <div class="ratio-value">${(PRICES.gold_silver_ratio||0).toFixed(1)}</div>
    <div class="price-sub" style="margin-top:8px">How many ounces of silver to buy 1 oz of gold</div>
  </div>`;

  // Currency table
  const curFlags={'USD':'🇺🇸','EUR':'🇪🇺','GBP':'🇬🇧','JPY':'🇯🇵','CHF':'🇨🇭','AUD':'🇦🇺','CAD':'🇨🇦','SGD':'🇸🇬'};
  extra+=`<div class="card"><div class="card-title">💱 Currency Rates (per 1 unit → INR)</div>
    <div class="table-wrap"><table class="cur-table"><thead><tr><th>Currency</th><th>Rate (₹)</th></tr></thead><tbody>`;
  Object.keys(CURRENCIES).sort().forEach(k=>{
    const cur=k.replace('_INR','');
    const flag=curFlags[cur]||'';
    extra+=`<tr><td>${flag} ${cur}</td><td>₹${fmt(CURRENCIES[k],4)}</td></tr>`;
  });
  extra+=`</tbody></table></div></div>`;
  extra+='</div>';

  p.innerHTML=cards+extra;
})();

// ── Portfolio ───────────────────────────────────────────────
const PORTFOLIO_KEY='goldsilver_portfolio';

function loadPortfolio(){
  try{return JSON.parse(localStorage.getItem(PORTFOLIO_KEY))||defaultPortfolio();}
  catch(e){return defaultPortfolio();}
}
function defaultPortfolio(){return {holdings:[],sells:[],cash:0};}
function savePortfolio(pf){localStorage.setItem(PORTFOLIO_KEY,JSON.stringify(pf));}

function currentPricePerGram(metal){
  const d=PRICES[metal]||{};
  return d.price_per_gram_inr||0;
}

function renderPortfolio(){
  const pf=loadPortfolio();
  const p=document.getElementById('panel-portfolio');

  // Compute totals
  let totalInvested=0,totalCurrent=0;
  const byMetal={gold:{qty:0,invested:0},silver:{qty:0,invested:0},platinum:{qty:0,invested:0}};
  pf.holdings.forEach(h=>{
    const inv=h.quantity_g*h.buy_price_per_g;
    const cur=h.quantity_g*currentPricePerGram(h.metal);
    totalInvested+=inv;totalCurrent+=cur;
    byMetal[h.metal].qty+=h.quantity_g;
    byMetal[h.metal].invested+=inv;
  });
  const totalValue=totalCurrent+pf.cash;
  const unrealised=totalCurrent-totalInvested;

  // Summary
  let html=`<div class="port-summary">
    <div class="port-stat"><div class="label">🥇 Gold</div><div class="value">${fmt(byMetal.gold.qty,2)}g<br><small>${fmtC(byMetal.gold.qty*currentPricePerGram('gold'))}</small></div></div>
    <div class="port-stat"><div class="label">🥈 Silver</div><div class="value">${fmt(byMetal.silver.qty,2)}g<br><small>${fmtC(byMetal.silver.qty*currentPricePerGram('silver'))}</small></div></div>
    <div class="port-stat"><div class="label">⚪ Platinum</div><div class="value">${fmt(byMetal.platinum.qty,2)}g<br><small>${fmtC(byMetal.platinum.qty*currentPricePerGram('platinum'))}</small></div></div>
    <div class="port-stat"><div class="label">💵 Cash</div><div class="value">${fmtC(pf.cash)}</div></div>
    <div class="port-stat"><div class="label">📦 Total Value</div><div class="value">${fmtC(totalValue)}</div></div>
    <div class="port-stat"><div class="label">📈 Unrealised P&L</div><div class="value ${unrealised>=0?'pnl-pos':'pnl-neg'}">${unrealised>=0?'+':''}${fmtC(unrealised)}</div></div>
  </div>`;

  // Holdings table
  html+=`<div class="card"><div class="card-title">📋 Holdings</div>`;
  if(pf.holdings.length===0){
    html+=`<p style="color:var(--text2)">No holdings yet. Add your first metal below.</p>`;
  } else {
    html+=`<div class="table-wrap"><table>
      <thead><tr><th>Metal</th><th>Qty (g)</th><th>Buy ₹/g</th><th>Current ₹/g</th><th>Value</th><th>P&L</th><th>Date</th><th>Notes</th><th></th></tr></thead><tbody>`;
    pf.holdings.forEach(h=>{
      const cur=currentPricePerGram(h.metal);
      const val=h.quantity_g*cur;
      const pnl=h.quantity_g*(cur-h.buy_price_per_g);
      const pnlCls=pnl>=0?'pnl-pos':'pnl-neg';
      html+=`<tr>
        <td>${h.metal.charAt(0).toUpperCase()+h.metal.slice(1)}</td>
        <td>${fmt(h.quantity_g,2)}</td>
        <td>${fmtC(h.buy_price_per_g)}</td>
        <td>${fmtC(cur)}</td>
        <td>${fmtC(val)}</td>
        <td class="${pnlCls}">${pnl>=0?'+':''}${fmtC(pnl)}</td>
        <td>${esc(h.date||'—')}</td>
        <td>${esc(h.notes||'')}</td>
        <td><button class="btn btn-warning" onclick="openSellModal('${h.id}')">Sell</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // Add holding form
  html+=`<div class="card"><div class="card-title">➕ Add Holding</div>
    <div class="form-row">
      <div class="form-group" style="flex:1"><label>Metal</label>
        <select id="addMetal"><option value="gold">Gold</option><option value="silver">Silver</option><option value="platinum">Platinum</option></select></div>
      <div class="form-group" style="flex:1"><label>Quantity (grams)</label><input type="number" id="addQty" step="0.01" min="0" placeholder="e.g. 100"></div>
      <div class="form-group" style="flex:1"><label>Buy Price (₹/gram)</label><input type="number" id="addPrice" step="0.01" min="0" placeholder="e.g. 7200"></div>
      <div class="form-group" style="flex:1"><label>Date</label><input type="date" id="addDate"></div>
      <div class="form-group" style="flex:1.5"><label>Notes</label><input type="text" id="addNotes" placeholder="e.g. 10g bar from XYZ"></div>
      <div class="form-group"><label>&nbsp;</label><button class="btn btn-success" onclick="addHolding()">Add</button></div>
    </div>
  </div>`;

  // Cash form
  html+=`<div class="card"><div class="card-title">💵 Cash Balance</div>
    <div class="form-row">
      <div class="form-group" style="flex:1"><label>Current Cash (₹)</label><input type="number" id="cashInput" step="1" min="0" value="${pf.cash}"></div>
      <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="updateCash()">Update Cash</button></div>
    </div>
  </div>`;

  // Sell history
  html+=`<div class="card"><div class="card-title">📜 Sell History</div>`;
  if(pf.sells.length===0){
    html+=`<p style="color:var(--text2)">No sells recorded yet.</p>`;
  } else {
    html+=`<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Metal</th><th>Qty (g)</th><th>Buy ₹/g</th><th>Sell ₹/g</th><th>P&L</th></tr></thead><tbody>`;
    pf.sells.forEach(s=>{
      const pnlCls=s.pnl>=0?'pnl-pos':'pnl-neg';
      html+=`<tr>
        <td>${esc(s.date||'—')}</td>
        <td>${s.metal.charAt(0).toUpperCase()+s.metal.slice(1)}</td>
        <td>${fmt(s.quantity_g,2)}</td>
        <td>${fmtC(s.buy_avg_price||0)}</td>
        <td>${fmtC(s.sell_price_per_g||0)}</td>
        <td class="${pnlCls}">${s.pnl>=0?'+':''}${fmtC(s.pnl)}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // Import / Export
  html+=`<div class="card" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-outline" onclick="exportPortfolio()">📤 Export JSON</button>
    <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importPortfolio(event)">
    <button class="btn btn-danger" onclick="if(confirm('Delete ALL portfolio data?')){localStorage.removeItem(PORTFOLIO_KEY);renderPortfolio();}">🗑️ Clear All</button>
  </div>`;

  p.innerHTML=html;
}

// Portfolio actions
function addHolding(){
  const metal=document.getElementById('addMetal').value;
  const qty=parseFloat(document.getElementById('addQty').value);
  const price=parseFloat(document.getElementById('addPrice').value);
  const date=document.getElementById('addDate').value||new Date().toISOString().slice(0,10);
  const notes=document.getElementById('addNotes').value;
  if(!qty||qty<=0||!price||price<=0){alert('Please enter valid quantity and price.');return;}
  const pf=loadPortfolio();
  pf.holdings.push({id:uid(),metal,quantity_g:qty,buy_price_per_g:price,date,notes});
  savePortfolio(pf);renderPortfolio();
}

function updateCash(){
  const cash=parseFloat(document.getElementById('cashInput').value)||0;
  const pf=loadPortfolio();pf.cash=cash;savePortfolio(pf);renderPortfolio();
}

function openSellModal(holdingId){
  const pf=loadPortfolio();
  const h=pf.holdings.find(x=>x.id===holdingId);
  if(!h)return;

  // Create modal
  let overlay=document.getElementById('sellOverlay');
  if(overlay)overlay.remove();
  overlay=document.createElement('div');
  overlay.id='sellOverlay';overlay.className='modal-overlay open';
  overlay.innerHTML=`<div class="modal">
    <h2>Sell ${h.metal.charAt(0).toUpperCase()+h.metal.slice(1)}</h2>
    <p style="color:var(--text2);margin-bottom:12px">Holding: ${fmt(h.quantity_g,2)}g @ ₹${fmt(h.buy_price_per_g,2)}/g</p>
    <div class="form-group"><label>Quantity to sell (grams)</label><input type="number" id="sellQty" step="0.01" min="0.01" max="${h.quantity_g}" value="${h.quantity_g}"></div>
    <div class="form-group"><label>Sell Price (₹/gram)</label><input type="number" id="sellPrice" step="0.01" min="0" value="${currentPricePerGram(h.metal).toFixed(2)}"></div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn btn-success" onclick="confirmSell('${holdingId}')">Confirm Sell</button>
      <button class="btn btn-outline" onclick="document.getElementById('sellOverlay').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function confirmSell(holdingId){
  const qty=parseFloat(document.getElementById('sellQty').value);
  const sellPrice=parseFloat(document.getElementById('sellPrice').value);
  if(!qty||qty<=0||!sellPrice||sellPrice<=0){alert('Enter valid values.');return;}
  const pf=loadPortfolio();
  const idx=pf.holdings.findIndex(x=>x.id===holdingId);
  if(idx===-1)return;
  const h=pf.holdings[idx];
  if(qty>h.quantity_g){alert('Cannot sell more than you hold.');return;}
  const pnl=qty*(sellPrice-h.buy_price_per_g);
  pf.sells.push({id:uid(),metal:h.metal,quantity_g:qty,sell_price_per_g:sellPrice,buy_avg_price:h.buy_price_per_g,date:new Date().toISOString().slice(0,10),pnl:Math.round(pnl*100)/100});
  pf.cash+=qty*sellPrice;
  if(qty>=h.quantity_g){pf.holdings.splice(idx,1);}else{pf.holdings[idx].quantity_g-=qty;}
  savePortfolio(pf);
  document.getElementById('sellOverlay').remove();
  renderPortfolio();
}

function exportPortfolio(){
  const pf=loadPortfolio();
  const blob=new Blob([JSON.stringify(pf,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='goldsilver_portfolio_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importPortfolio(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.holdings&&Array.isArray(data.holdings)){
        savePortfolio(data);renderPortfolio();alert('Portfolio imported successfully!');
      }else{alert('Invalid portfolio file.');}
    }catch(err){alert('Failed to parse file: '+err.message);}
  };
  reader.readAsText(file);
  event.target.value='';
}

// Initial render
renderPortfolio();

// ── News ────────────────────────────────────────────────────
(function renderNews(){
  const p=document.getElementById('panel-news');
  const categories=['all','metals','geopolitics','central_bank','currency','inflation','supply_demand','platinum','market'];
  const catLabels={all:'All',metals:'🥇 Metals',geopolitics:'🌍 Geopolitics',central_bank:'🏦 Central Bank',
    currency:'💱 Currency',inflation:'📈 Inflation',supply_demand:'⚖️ Supply/Demand',platinum:'⚪ Platinum',market:'📊 Market'};
  const catColors={metals:'var(--gold)',geopolitics:'#f78166',central_bank:'var(--blue)',currency:'#a371f7',
    inflation:'#f97583',supply_demand:'#56d364',platinum:'var(--platinum)',market:'var(--text2)'};

  let filterHtml='<div class="news-filters" id="newsFilters">';
  categories.forEach(c=>{
    filterHtml+=`<button data-cat="${c}" class="${c==='all'?'active':''}">${catLabels[c]||c}</button>`;
  });
  filterHtml+='</div>';

  function renderCards(filter){
    const items=filter==='all'?NEWS:NEWS.filter(n=>n.category===filter);
    if(items.length===0)return '<p style="color:var(--text2)">No articles found.</p>';
    let h='<div class="grid grid-2">';
    items.forEach(n=>{
      const cc=catColors[n.category]||'var(--text2)';
      h+=`<div class="card news-card">
        <h3><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a></h3>
        <p style="color:var(--text2);font-size:.9rem">${esc((n.description||'').slice(0,200))}</p>
        <div class="meta">
          <span class="badge badge-cat" style="background:${cc}22;color:${cc}">${esc(n.category)}</span>
          <span>${esc(n.source)}</span>
          <span>${esc(n.date)}</span>
        </div>
      </div>`;
    });
    h+='</div>';
    return h;
  }

  p.innerHTML=filterHtml+'<div id="newsCards">'+renderCards('all')+'</div>';

  document.getElementById('newsFilters').addEventListener('click',e=>{
    if(e.target.tagName!=='BUTTON')return;
    document.querySelectorAll('#newsFilters button').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('newsCards').innerHTML=renderCards(e.target.dataset.cat);
  });
})();
